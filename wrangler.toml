name = "atproto-worker"
main = "src/index.js"
compatibility_date = "2026-07-07"
compatibility_flags = ["websocket_hibernation"]

# Cron for interaction sync
[triggers]
crons = ["*/5 * * * *"]

# KV for journal cache
# Create with: npx wrangler kv namespace create JOURNAL_KV
# Then replace the id below with the returned namespace ID.
[[kv_namespaces]]
binding = "JOURNAL_KV"
id = "your-kv-namespace-id"

# Durable Object for WebSocket subscriptions
[[durable_objects.bindings]]
name = "FIREHOSE"
class_name = "Firehose"

[[migrations]]
tag = "v1"
new_classes = ["Firehose"]

[vars]
# Public configuration (not sensitive, safe in version control)
OWNER_DID = "did:web:example.com"
OWNER_HANDLE = "example.com"
# Multibase public key - set after running `node cli/seal.js init`
OWNER_PUBLIC_KEY = ""
# URL to fetch journal from (for /refresh endpoint)
JOURNAL_URL = ""

# Note: PRIVATE_KEY is only used by the local CLI (cli/seal.js), not by the Worker.
# It lives in config.json locally and must NEVER be committed or deployed as an env var.

# Development overrides
[env.dev.vars]
OWNER_DID = "did:web:example.com"
OWNER_HANDLE = "example.com"
OWNER_PUBLIC_KEY = "zQ3shXjHeiBuRCKmM36cuYnm7YEMzhGnCmCyW92sRJ9pribSF"
# For local dev, journal is loaded from file
