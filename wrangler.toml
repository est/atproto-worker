name = "atproto-worker"
main = "src/index.js"
compatibility_date = "2024-04-05"

# Cron for interaction sync
[triggers]
crons = ["*/5 * * * *"]

# KV for journal cache
[[kv_namespaces]]
binding = "JOURNAL_KV"
id = "your-kv-namespace-id"  # Create with: npx wrangler kv namespace create JOURNAL_KV

# Durable Object for WebSocket subscriptions
[[durable_objects.bindings]]
name = "FIREHOSE"
class_name = "Firehose"

[[migrations]]
tag = "v1"
new_classes = ["Firehose"]

[vars]
# Your DID
OWNER_DID = ""
# Your handle
OWNER_HANDLE = ""
# URL to fetch journal from (for /refresh endpoint)
JOURNAL_URL = ""

# Development overrides
[env.dev.vars]
OWNER_DID = "did:web:localhost:8787"
OWNER_HANDLE = "localhost"
# For local dev, journal is loaded from file
